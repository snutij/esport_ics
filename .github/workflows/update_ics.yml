name: Update ICS Calendar

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  workflow_dispatch: # Allows manual triggering of the workflow

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          bundler-cache: true

      - name: Run rake task to generate ICS
        run: bundle exec rake esport_ics:generate:ics:all
        env:
          PANDASCORE_API_TOKEN: ${{ secrets.PANDASCORE_API_TOKEN }}

      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ics/
          git diff --staged --quiet || (git commit -m 'chore: update ICS files' && git push)
