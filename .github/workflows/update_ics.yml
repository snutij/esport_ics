name: Update ICS Calendar

on:
  schedule:
    - cron: "0 * * * *" # Runs every hour
  workflow_dispatch: # Allows manual triggering of the workflow

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          bundler-cache: true

      - name: Run rake task to generate ICS
        run: bundle exec rake esport_ics:generate:ics:all
        env:
          PANDASCORE_API_TOKEN: ${{ secrets.PANDASCORE_API_TOKEN }}

      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add ics/
          git diff --staged --quiet || (git commit -m 'chore: update ICS files' && git push)
